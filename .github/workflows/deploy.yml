name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_URL }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/vortex-backend:latest
          ${{ secrets.REGISTRY_URL }}/vortex-backend:${{ github.ref_name }}
        cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/vortex-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/vortex-backend:buildcache,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/vortex-frontend:latest
          ${{ secrets.REGISTRY_URL }}/vortex-frontend:${{ github.ref_name }}
        cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/vortex-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/vortex-frontend:buildcache,mode=max
    
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/vortex-shield
          docker-compose pull
          docker-compose up -d
          docker-compose exec -T backend alembic upgrade head
          docker system prune -f
