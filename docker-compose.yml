services:
  postgres:
    image: postgres:15-alpine
    container_name: vortex-postgres
    environment:
      POSTGRES_DB: vortex_shield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vortex-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vortex_shield
      SECRET_KEY: dev-secret-key-change-in-production
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8001:8000"
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - vortex_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vortex-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - vortex_network

volumes:
  postgres_data:
  redis_data:

networks:
  vortex_network:
    driver: bridge
