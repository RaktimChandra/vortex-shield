global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'vortex-shield'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vortex-backend'
    static_configs:
      - targets: ['vortex-backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'vortex-frontend'
    static_configs:
      - targets: ['vortex-frontend:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
